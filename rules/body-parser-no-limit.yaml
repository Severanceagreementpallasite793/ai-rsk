id: BODY_PARSER_NO_LIMIT
version: 1
severity: WARN
cwe:
  - "CWE-770"
source:
  name: "CWE-770: Allocation of Resources Without Limits or Throttling"
  quote: "The product allocates a reusable resource or group of resources on behalf of an actor without imposing any intended restrictions on the size or number of resources that can be allocated."
  note: "CWE-400 is the parent but discouraged for direct mapping. CWE-770 is the specific child."
  verified: true
  verified_date: "2026-03-12"
languages:
  - javascript
  - typescript
file_patterns:
  - "*.js"
  - "*.ts"
  - "*.mjs"
  - "*.cjs"
patterns:
  - "express\\.json\\s*\\(\\s*\\)"
  - "express\\.urlencoded\\s*\\(\\s*\\)"
  - "bodyParser\\.json\\s*\\(\\s*\\)"
  - "bodyParser\\.urlencoded\\s*\\(\\s*\\)"
case_insensitive: false
message: "Body parser used without size limit. An attacker can send a multi-gigabyte JSON body to crash your server (DoS). Always set a limit."
fix: |
  Add a size limit to your body parser:
    app.use(express.json({ limit: '100kb' }));
    app.use(express.urlencoded({ extended: true, limit: '100kb' }));
  Choose a limit appropriate for your use case. 100kb is a safe default.
  For file uploads, use multer with explicit limits instead of body parser.
