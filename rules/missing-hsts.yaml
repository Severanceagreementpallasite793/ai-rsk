id: MISSING_HSTS
version: 1
severity: WARN
cwe:
  - "CWE-523"
source:
  name: "CWE-523: Unprotected Transport of Credentials"
  quote: "Login pages do not use adequate measures to protect the user name and password while they are in transit from the client to the server."
  verified: true
  verified_date: "2026-03-12"
languages:
  - javascript
  - typescript
file_patterns:
  - "*.js"
  - "*.ts"
  - "*.mjs"
  - "*.cjs"
patterns:
  - "(app|server|router)\\.(use|get|listen)\\s*\\("
negation: true
negation_pattern: "strict-transport-security|strictTransportSecurity|helmet\\s*\\(|hsts\\s*\\("
case_insensitive: true
message: "Server code detected without Strict-Transport-Security (HSTS) header. Without HSTS, the first request to your site can be intercepted via a man-in-the-middle attack before HTTPS kicks in."
fix: |
  Add HSTS headers. Using helmet (recommended):
    app.use(helmet());
  Or manually:
    app.use((req, res, next) => {
      res.setHeader('Strict-Transport-Security', 'max-age=31536000; includeSubDomains');
      next();
    });
  Start with a short max-age in testing, then increase to 1 year (31536000).
