id: HARDCODED_SECRET
version: 1
severity: BLOCK
cwe:
  - "CWE-798"
source:
  name: "CWE-798: Use of Hard-coded Credentials"
  quote: "The product contains hard-coded credentials, such as a password or cryptographic key, which it uses for its own inbound authentication, outbound communication to external components, or encryption of internal data."
  verified: true
  verified_date: "2026-03-14"
languages:
  - javascript
  - typescript
  - python
file_patterns:
  - "*.js"
  - "*.ts"
  - "*.jsx"
  - "*.tsx"
  - "*.mjs"
  - "*.cjs"
  - "*.py"
patterns:
  # Stripe keys (sk_live_, sk_test_, pk_live_, pk_test_, whsec_)
  - "(sk_live_|sk_test_|pk_live_|pk_test_|whsec_)[a-zA-Z0-9]{10,}"
  # AWS keys (AKIA...)
  - "AKIA[0-9A-Z]{16}"
  # Groq keys (gsk_)
  - "gsk_[a-zA-Z0-9]{20,}"
  # GitHub tokens (ghp_, gho_, ghu_, ghs_, ghr_)
  - "(ghp_|gho_|ghu_|ghs_|ghr_)[a-zA-Z0-9]{30,}"
  # Google API keys (AIza...)
  - "AIza[0-9A-Za-z\\-_]{35}"
  # Slack tokens (xoxb-, xoxp-, xoxs-, xoxa-)
  - "(xoxb|xoxp|xoxs|xoxa)-[0-9a-zA-Z\\-]{10,}"
  # Twilio (SK...)
  - "SK[0-9a-fA-F]{32}"
  # SendGrid (SG.)
  - "SG\\.[a-zA-Z0-9\\-_]{22,}"
  # Generic long hex secrets assigned to variables (key = "abc123def456...")
  - "(api_key|apikey|secret_key|secret|private_key|access_token)\\s*[:=]\\s*['\"`][a-zA-Z0-9+/\\-_]{32,}['\"`]"
case_insensitive: true
exclude_paths:
  - "test/"
  - "tests/"
  - "__tests__/"
  - "spec/"
  - "fixtures/"
  - "mocks/"
  - ".env.example"
message: "Hard-coded API key or secret detected in source code. This key is visible to anyone with access to the repository, including git history. Attackers scan public repos for these patterns automatically."
fix: |
  MOVE secrets to environment variables:
    // WRONG - secret in code:
    const apiKey = 'sk_live_abc123...';

    // RIGHT - secret from environment:
    const apiKey = process.env.STRIPE_SECRET_KEY;

  Use a .env file (NEVER committed to git) or a secrets manager.
  Add .env to .gitignore.
  If the key was already committed, REVOKE IT immediately - git history preserves it forever.
