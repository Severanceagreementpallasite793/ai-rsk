id: MISSING_XFRAME
version: 1
severity: WARN
cwe:
  - "CWE-1021"
source:
  name: "CWE-1021: Improper Restriction of Rendered UI Layers or Frames"
  quote: "The web application does not restrict or incorrectly restricts frame objects or UI layers that belong to another application or domain."
  verified: true
  verified_date: "2026-03-12"
languages:
  - javascript
  - typescript
file_patterns:
  - "*.js"
  - "*.ts"
  - "*.mjs"
  - "*.cjs"
patterns:
  - "(app|server|router)\\.(use|get|listen)\\s*\\("
negation: true
negation_pattern: "x-frame-options|frameguard|frame-ancestors|helmet\\s*\\("
case_insensitive: true
message: "Server code detected without X-Frame-Options or frame-ancestors CSP directive. Without this protection, your site can be embedded in an iframe on a malicious page (clickjacking)."
fix: |
  Add X-Frame-Options. Using helmet (recommended):
    app.use(helmet());
  Or manually:
    app.use((req, res, next) => {
      res.setHeader('X-Frame-Options', 'DENY');
      next();
    });
  Modern alternative: use CSP frame-ancestors directive:
    Content-Security-Policy: frame-ancestors 'none'
