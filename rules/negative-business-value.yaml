id: NEGATIVE_BUSINESS_VALUE
version: 2
severity: WARN
cwe:
  - "CWE-20"
source:
  name: "CWE-20: Improper Input Validation"
  quote: "The product receives input or data, but it does not validate or incorrectly validates that the input has the properties that are required to process the data safely and correctly."
  note: "CWE-20 is class-level and discouraged for precise mapping. No more specific CWE exists for negative business value bypass. Documented honestly."
  verified: true
  verified_date: "2026-03-12"
languages:
  - javascript
  - typescript
file_patterns:
  - "*.js"
  - "*.ts"
  - "*.mjs"
  - "*.cjs"
patterns:
  - "(price|amount|total|quantity|qty|cost|fee|charge|payment|balance|credit|discount)\\s*=\\s*(req\\.|request\\.|body\\.|params\\.|query\\.)"
case_insensitive: true
message: "Business-critical numeric value (price, quantity, amount) taken directly from user input without validation. An attacker can send negative values to get free products, reverse charges, or manipulate balances."
fix: |
  ALWAYS validate business values server-side:
    const quantity = parseInt(req.body.quantity, 10);
    if (!Number.isFinite(quantity) || quantity < 1 || quantity > 9999) {
      return res.status(400).json({ error: 'Invalid quantity' });
    }
    const price = parseFloat(req.body.price);
    if (!Number.isFinite(price) || price < 0) {
      return res.status(400).json({ error: 'Invalid price' });
    }
  NEVER trust client-side validation for money or quantities.
  Recalculate totals server-side - never accept a total from the client.
